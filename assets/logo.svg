<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 120" role="img" aria-label="SuirViewDigital">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13233F"/>
      <stop offset="1" stop-color="#0A0B0F"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4C888"/>
      <stop offset="0.5" stop-color="#C9A96A"/>
      <stop offset="1" stop-color="#A9884E"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Emblem -->
  <g transform="translate(6,18)">
    <rect x="1" y="1" width="82" height="82" rx="20" fill="url(#panel)" stroke="url(#gold)" stroke-width="1.5"/>
    <!-- V for View -->
    <path d="M26 24 L42 55 L58 24" fill="none" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- horizon -->
    <line x1="20" y1="60" x2="64" y2="60" stroke="url(#gold)" stroke-width="1.6" opacity="0.85"/>
    <!-- water shimmer -->
    <line x1="26" y1="66" x2="58" y2="66" stroke="url(#blue)" stroke-width="2.4" stroke-linecap="round" opacity="0.55"/>
    <line x1="30" y1="71" x2="54" y2="71" stroke="url(#blue)" stroke-width="2.2" stroke-linecap="round" opacity="0.38"/>
    <line x1="34" y1="75" x2="50" y2="75" stroke="url(#blue)" stroke-width="2" stroke-linecap="round" opacity="0.24"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(108,0)">
    <text x="0" y="62" font-family="Fraunces, 'Cormorant Garamond', Georgia, serif" font-size="46" font-weight="600" letter-spacing="-0.5" fill="#F7F5F1">Suir<tspan fill="url(#gold)">View</tspan></text>
    <text x="2" y="90" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" letter-spacing="7" fill="#8B93A7">DIGITAL</text>
  </g>
</svg>
