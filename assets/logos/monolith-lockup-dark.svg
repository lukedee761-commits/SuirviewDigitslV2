<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 120" role="img" aria-label="SuirViewDigital">
  <defs>
    <linearGradient id="monolithDl-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13233F"/><stop offset="1" stop-color="#0A0B0F"/>
    </linearGradient>
    <linearGradient id="monolithDl-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4C888"/><stop offset="0.5" stop-color="#C9A96A"/><stop offset="1" stop-color="#A9884E"/>
    </linearGradient>
    <linearGradient id="monolithDl-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="monolithDl-river" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A96A"/><stop offset="0.55" stop-color="#E4C888"/><stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <g transform="translate(8,12)">
    <rect x="1" y="1" width="94" height="94" rx="8" fill="url(#monolithDl-gold)"/>
    <!-- S carved -->
    <path d="M47 30 C47 24.5 37 23 31.5 26.5 C25 30.5 26 37.5 33.5 40.5 C41 43.5 45.5 46 44.4 51.8 C43.3 57.8 34 60.5 28 57.4"
          fill="none" stroke="#0A0B0F" stroke-width="6" stroke-linecap="butt"/>
    <!-- V carved -->
    <path d="M50 31 L59.5 59 L69 31" fill="none" stroke="#0A0B0F" stroke-width="6.4"
          stroke-linecap="butt" stroke-linejoin="miter"/>
    <!-- river bar -->
    <rect x="27" y="70" width="42" height="3.2" fill="#0A0B0F" opacity="0.9"/>
    <rect x="27" y="77" width="26" height="3.2" fill="#3B82F6" opacity="0.85"/>
  </g>
  <g transform="translate(126,0)">
    <text x="0" y="62" font-family="Fraunces, 'Cormorant Garamond', Georgia, serif" font-size="46" font-weight="600" letter-spacing="-0.5" fill="#F7F5F1">Suir<tspan fill="url(#monolithDl-gold)">View</tspan></text>
    <text x="2" y="90" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" letter-spacing="7" fill="#8B93A7">DIGITAL</text>
  </g>
</svg>