<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 120" role="img" aria-label="SuirViewDigital">
  <defs>
    <linearGradient id="ottermonoLl-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13233F"/><stop offset="1" stop-color="#0A0B0F"/>
    </linearGradient>
    <linearGradient id="ottermonoLl-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4C888"/><stop offset="0.5" stop-color="#C9A96A"/><stop offset="1" stop-color="#A9884E"/>
    </linearGradient>
    <linearGradient id="ottermonoLl-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <g transform="translate(8,12)">
    <rect x="1" y="1" width="94" height="94" rx="8" fill="url(#ottermonoLl-gold)"/>
    <!-- ears -->
    <circle cx="36.69" cy="31.86" r="4.836" fill="none" stroke="#FFFFFF" stroke-width="2.465"/>
    <circle cx="59.31" cy="31.86" r="4.836" fill="none" stroke="#FFFFFF" stroke-width="2.465"/>
    <!-- crown / head -->
    <path d="M33.18 44.34 C33.18 32.64 39.42 27.96 48.0 27.96 C56.58 27.96 62.82 32.64 62.82 44.34
             C62.82 52.14 56.58 56.82 48.0 56.82 C39.42 56.82 33.18 52.14 33.18 44.34 Z"
          fill="none" stroke="#FFFFFF" stroke-width="2.9"/>
    <!-- broad muzzle (the otter tell) -->
    <path d="M39.42 49.02 C39.42 55.26 44.1 57.6 48.0 57.6 C51.9 57.6 56.58 55.26 56.58 49.02"
          fill="none" stroke="#FFFFFF" stroke-width="2.088"/>
    <!-- nose -->
    <path d="M44.88 46.68 C44.88 44.73 51.12 44.73 51.12 46.68 C51.12 49.02 48.0 50.58 48.0 50.58
             C48.0 50.58 44.88 49.02 44.88 46.68 Z" fill="#FFFFFF"/>
    <!-- eyes -->
    <circle cx="41.37" cy="40.44" r="1.9500000000000002" fill="#FFFFFF"/>
    <circle cx="54.63" cy="40.44" r="1.9500000000000002" fill="#FFFFFF"/>
    <!-- whiskers -->
    <path d="M38.64 50.58 L29.28 48.24 M38.64 52.92 L30.06 53.7
             M57.36 50.58 L66.72 48.24 M57.36 52.92 L65.94 53.7"
          stroke="#FFFFFF" stroke-width="1.45" stroke-linecap="round" opacity="0.85"/>
    <rect x="27" y="72" width="42" height="3.2" fill="#FFFFFF" opacity="0.9"/>
    <rect x="27" y="79" width="26" height="3.2" fill="#3B82F6" opacity="0.85"/>
  </g>
  <g transform="translate(126,0)">
    <text x="0" y="62" font-family="Fraunces, 'Cormorant Garamond', Georgia, serif" font-size="46" font-weight="600" letter-spacing="-0.5" fill="#0A0B0F">Suir<tspan fill="url(#ottermonoLl-gold)">View</tspan></text>
    <text x="2" y="90" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" letter-spacing="7" fill="#5A6478">DIGITAL</text>
  </g>
