<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 120" role="img" aria-label="SuirViewDigital">
  <defs>
    <linearGradient id="ottersealLl-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13233F"/><stop offset="1" stop-color="#0A0B0F"/>
    </linearGradient>
    <linearGradient id="ottersealLl-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4C888"/><stop offset="0.5" stop-color="#C9A96A"/><stop offset="1" stop-color="#A9884E"/>
    </linearGradient>
    <linearGradient id="ottersealLl-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <g transform="translate(8,12)">
    <circle cx="48" cy="48" r="45" fill="#FFFFFF" stroke="url(#ottersealLl-gold)" stroke-width="2"/>
    <circle cx="48" cy="48" r="39.5" fill="none" stroke="url(#ottersealLl-gold)" stroke-width="0.9" opacity="0.45"/>
    <!-- ears -->
    <circle cx="36.4" cy="33.6" r="4.960000000000001" fill="none" stroke="url(#ottersealLl-gold)" stroke-width="2.295"/>
    <circle cx="59.6" cy="33.6" r="4.960000000000001" fill="none" stroke="url(#ottersealLl-gold)" stroke-width="2.295"/>
    <!-- crown / head -->
    <path d="M32.8 46.4 C32.8 34.4 39.2 29.6 48.0 29.6 C56.8 29.6 63.2 34.4 63.2 46.4
             C63.2 54.4 56.8 59.2 48.0 59.2 C39.2 59.2 32.8 54.4 32.8 46.4 Z"
          fill="none" stroke="url(#ottersealLl-gold)" stroke-width="2.7"/>
    <!-- broad muzzle (the otter tell) -->
    <path d="M39.2 51.2 C39.2 57.6 44.0 60.0 48.0 60.0 C52.0 60.0 56.8 57.6 56.8 51.2"
          fill="none" stroke="url(#ottersealLl-gold)" stroke-width="1.944"/>
    <!-- nose -->
    <path d="M44.8 48.8 C44.8 46.8 51.2 46.8 51.2 48.8 C51.2 51.2 48.0 52.8 48.0 52.8
             C48.0 52.8 44.8 51.2 44.8 48.8 Z" fill="url(#ottersealLl-gold)"/>
    <!-- eyes -->
    <circle cx="41.2" cy="42.4" r="2.0" fill="url(#ottersealLl-gold)"/>
    <circle cx="54.8" cy="42.4" r="2.0" fill="url(#ottersealLl-gold)"/>
    <!-- whiskers -->
    <path d="M38.4 52.8 L28.799999999999997 50.4 M38.4 55.2 L29.599999999999998 56.0
             M57.6 52.8 L67.2 50.4 M57.6 55.2 L66.4 56.0"
          stroke="url(#ottersealLl-gold)" stroke-width="1.35" stroke-linecap="round" opacity="0.85"/>
    <line x1="34" y1="74" x2="62" y2="74" stroke="url(#ottersealLl-gold)" stroke-width="1.3" opacity="0.9"/>
    <line x1="39" y1="79" x2="57" y2="79" stroke="url(#ottersealLl-blue)" stroke-width="1.7" stroke-linecap="round" opacity="0.5"/>
  </g>
  <g transform="translate(126,0)">
    <text x="0" y="62" font-family="Fraunces, 'Cormorant Garamond', Georgia, serif" font-size="46" font-weight="600" letter-spacing="-0.5" fill="#0A0B0F">Suir<tspan fill="url(#ottersealLl-gold)">View</tspan></text>
    <text x="2" y="90" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" letter-spacing="7" fill="#5A6478">DIGITAL</text>
  </g>
</svg>